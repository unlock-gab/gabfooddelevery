services:

  # ─── PostgreSQL Database ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: fooddelivery
      POSTGRES_USER: fooddelivery
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fooddelivery -d fooddelivery"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ─── Database Migrations (runs once on deploy) ─────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrate
    environment:
      DATABASE_URL: postgres://fooddelivery:${DB_PASSWORD}@db:5432/fooddelivery
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  # ─── Backend API ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    environment:
      PORT: "8080"
      NODE_ENV: production
      DATABASE_URL: postgres://fooddelivery:${DB_PASSWORD}@db:5432/fooddelivery
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # ─── Frontend (Nginx) ───────────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:80"
    depends_on:
      - api

volumes:
  db_data:
