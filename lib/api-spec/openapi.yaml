components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    # AUTH
    RegisterBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [customer, restaurant, driver]
      required:
        - name
        - email
        - password
        - role

    LoginBody:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required:
        - user
        - token

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [customer, restaurant, driver, admin]
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - role
        - isActive
        - createdAt

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
        avatarUrl:
          type: ["string", "null"]
        language:
          type: string
        riskScore:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - role
        - language
        - createdAt

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        language:
          type: ["string", "null"]

    Address:
      type: object
      properties:
        id:
          type: integer
        label:
          type: ["string", "null"]
        fullAddress:
          type: string
        landmark:
          type: ["string", "null"]
        floor:
          type: ["string", "null"]
        instructions:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        isDefault:
          type: boolean
      required:
        - id
        - fullAddress
        - isDefault

    CreateAddressBody:
      type: object
      properties:
        label:
          type: ["string", "null"]
        fullAddress:
          type: string
        landmark:
          type: ["string", "null"]
        floor:
          type: ["string", "null"]
        instructions:
          type: ["string", "null"]
        lat:
          type: ["number", "null"]
        lng:
          type: ["number", "null"]
        isDefault:
          type: boolean
      required:
        - fullAddress

    # CITY / ZONE
    City:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - isActive
        - createdAt

    CreateCityBody:
      type: object
      properties:
        name:
          type: string
        nameAr:
          type: ["string", "null"]
      required:
        - name

    UpdateCityBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        nameAr:
          type: ["string", "null"]
        isActive:
          type: ["boolean", "null"]

    Zone:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        cityId:
          type: integer
        deliveryFee:
          type: ["number", "null"]
        estimatedMinutes:
          type: ["integer", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - cityId
        - isActive
        - createdAt

    CreateZoneBody:
      type: object
      properties:
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        deliveryFee:
          type: ["number", "null"]
        estimatedMinutes:
          type: ["integer", "null"]
      required:
        - name

    UpdateZoneBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        nameAr:
          type: ["string", "null"]
        deliveryFee:
          type: ["number", "null"]
        estimatedMinutes:
          type: ["integer", "null"]
        isActive:
          type: ["boolean", "null"]

    # RESTAURANT
    Restaurant:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        coverUrl:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        cityId:
          type: ["integer", "null"]
        zoneId:
          type: ["integer", "null"]
        status:
          type: string
          enum: [pending, approved, rejected, suspended]
        isOpen:
          type: boolean
        category:
          type: ["string", "null"]
        avgRating:
          type: ["number", "null"]
        totalOrders:
          type: ["integer", "null"]
        estimatedPrepTime:
          type: ["integer", "null"]
        commissionRate:
          type: ["number", "null"]
        createdAt:
          type: string
      required:
        - id
        - name
        - status
        - isOpen
        - createdAt

    CreateRestaurantBody:
      type: object
      properties:
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        cityId:
          type: ["integer", "null"]
        zoneId:
          type: ["integer", "null"]
        category:
          type: ["string", "null"]
        estimatedPrepTime:
          type: ["integer", "null"]
      required:
        - name

    UpdateRestaurantBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        nameAr:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        coverUrl:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        cityId:
          type: ["integer", "null"]
        zoneId:
          type: ["integer", "null"]
        isOpen:
          type: ["boolean", "null"]
        category:
          type: ["string", "null"]
        estimatedPrepTime:
          type: ["integer", "null"]
        commissionRate:
          type: ["number", "null"]
        status:
          type: ["string", "null"]

    RestaurantHours:
      type: object
      properties:
        id:
          type: integer
        dayOfWeek:
          type: integer
        openTime:
          type: string
        closeTime:
          type: string
        isOpen:
          type: boolean
      required:
        - id
        - dayOfWeek
        - openTime
        - closeTime
        - isOpen

    SetRestaurantHoursBody:
      type: object
      properties:
        hours:
          type: array
          items:
            type: object
            properties:
              dayOfWeek:
                type: integer
              openTime:
                type: string
              closeTime:
                type: string
              isOpen:
                type: boolean
            required:
              - dayOfWeek
              - openTime
              - closeTime
              - isOpen
      required:
        - hours

    RestaurantStats:
      type: object
      properties:
        totalOrders:
          type: integer
        completedOrders:
          type: integer
        cancelledOrders:
          type: integer
        avgRating:
          type: number
        avgPrepTime:
          type: number
        revenue:
          type: number
        cancellationRate:
          type: number
      required:
        - totalOrders
        - completedOrders
        - cancelledOrders
        - avgRating
        - avgPrepTime
        - revenue
        - cancellationRate

    # MENUS
    MenuCategory:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        restaurantId:
          type: integer
        sortOrder:
          type: integer
        isActive:
          type: boolean
      required:
        - id
        - name
        - restaurantId
        - sortOrder
        - isActive

    CreateMenuCategoryBody:
      type: object
      properties:
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        sortOrder:
          type: ["integer", "null"]
      required:
        - name

    UpdateMenuCategoryBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        nameAr:
          type: ["string", "null"]
        sortOrder:
          type: ["integer", "null"]
        isActive:
          type: ["boolean", "null"]

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        categoryId:
          type: integer
        restaurantId:
          type: integer
        isAvailable:
          type: boolean
        preparationTime:
          type: ["integer", "null"]
        sortOrder:
          type: integer
      required:
        - id
        - name
        - price
        - categoryId
        - restaurantId
        - isAvailable
        - sortOrder

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        nameAr:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        categoryId:
          type: integer
        preparationTime:
          type: ["integer", "null"]
        sortOrder:
          type: ["integer", "null"]
      required:
        - name
        - price
        - categoryId

    UpdateProductBody:
      type: object
      properties:
        name:
          type: ["string", "null"]
        nameAr:
          type: ["string", "null"]
        description:
          type: ["string", "null"]
        price:
          type: ["number", "null"]
        imageUrl:
          type: ["string", "null"]
        categoryId:
          type: ["integer", "null"]
        isAvailable:
          type: ["boolean", "null"]
        preparationTime:
          type: ["integer", "null"]
        sortOrder:
          type: ["integer", "null"]

    # CART
    Cart:
      type: object
      properties:
        id:
          type: integer
        restaurantId:
          type: ["integer", "null"]
        restaurantName:
          type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/CartItem"
        subtotal:
          type: number
        deliveryFee:
          type: number
        total:
          type: number
      required:
        - id
        - items
        - subtotal
        - deliveryFee
        - total

    CartItem:
      type: object
      properties:
        id:
          type: integer
        productId:
          type: integer
        productName:
          type: string
        price:
          type: number
        quantity:
          type: integer
        imageUrl:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
      required:
        - id
        - productId
        - productName
        - price
        - quantity

    AddToCartBody:
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
        notes:
          type: ["string", "null"]
      required:
        - productId
        - quantity

    UpdateCartItemBody:
      type: object
      properties:
        quantity:
          type: integer
      required:
        - quantity

    # ORDERS
    Order:
      type: object
      properties:
        id:
          type: integer
        orderNumber:
          type: string
        status:
          type: string
          enum:
            - draft
            - pending_dispatch
            - dispatching_driver
            - driver_assigned
            - awaiting_customer_confirmation
            - needs_update
            - confirmation_failed
            - confirmed_for_preparation
            - preparing
            - ready_for_pickup
            - picked_up
            - on_the_way
            - arriving_soon
            - delivered
            - cancelled
            - failed
            - refunded
        customerId:
          type: integer
        restaurantId:
          type: integer
        restaurantName:
          type: string
        driverId:
          type: ["integer", "null"]
        driverName:
          type: ["string", "null"]
        deliveryAddress:
          type: string
        deliveryLandmark:
          type: ["string", "null"]
        deliveryFloor:
          type: ["string", "null"]
        deliveryInstructions:
          type: ["string", "null"]
        subtotal:
          type: number
        deliveryFee:
          type: number
        total:
          type: number
        paymentMethod:
          type: string
          enum: [cash_on_delivery, online]
        paymentStatus:
          type: string
          enum: [pending, authorized, paid, failed, refunded, cash_on_delivery]
        estimatedDeliveryMinutes:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - orderNumber
        - status
        - customerId
        - restaurantId
        - restaurantName
        - deliveryAddress
        - subtotal
        - deliveryFee
        - total
        - paymentMethod
        - paymentStatus
        - createdAt
        - updatedAt

